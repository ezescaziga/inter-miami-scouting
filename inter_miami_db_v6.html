<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f4f4f2;}
.wrap{border-radius:12px;overflow:hidden;border:1px solid #ddd;}
.top-bar{height:5px;background:linear-gradient(90deg,#E0115F 0%,#C4973B 50%,#E0115F 100%);}
.hdr{background:#111;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.hdr-title{color:white;font-size:15px;font-weight:800;}
.hdr-sub{color:#666;font-size:10px;margin-top:2px;}
.hdr-stats{display:flex;gap:16px;}
.hs{text-align:center;}
.hs-n{font-size:18px;font-weight:800;line-height:1;}
.hs-l{color:#666;font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.main-tabs{background:white;padding:0 18px;display:flex;gap:0;border-bottom:2px solid #eee;overflow-x:auto;}
.mtab{padding:10px 16px;font-size:12px;font-weight:700;color:#888;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;margin-bottom:-2px;transition:all .15s;}
.mtab.active{color:#E0115F;border-bottom-color:#E0115F;}
.mtab:hover{color:#E0115F;}
.toolbar{background:white;padding:10px 18px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #eee;}
input.srch{flex:1;min-width:140px;padding:6px 12px;border:1px solid #ddd;border-radius:20px;font-size:12px;}
input.srch:focus{outline:none;border-color:#E0115F;}
select.flt{padding:6px 10px;border:1px solid #ddd;border-radius:20px;font-size:12px;cursor:pointer;max-width:200px;}
select.flt:focus{outline:none;border-color:#E0115F;}
.btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:none;}
.btn-pink{background:#E0115F;color:white;}.btn-pink:hover{background:#c40f52;}
.btn-dark{background:#111;color:white;}.btn-dark:hover{background:#333;}
.pos-tabs{background:white;padding:0 18px;display:flex;gap:0;border-bottom:2px solid #eee;overflow-x:auto;}
.ptab{padding:9px 14px;font-size:12px;font-weight:700;color:#888;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;margin-bottom:-2px;display:flex;align-items:center;gap:6px;transition:all .15s;}
.ptab.active{color:#E0115F;border-bottom-color:#E0115F;}.ptab:hover{color:#E0115F;}
.cpill{background:#eee;color:#888;font-size:9px;padding:1px 6px;border-radius:10px;}
.ptab.active .cpill{background:#fde8f0;color:#E0115F;}
.role-tabs{background:#f9f9f9;padding:6px 18px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #eee;}
.rtab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #ddd;color:#666;background:white;transition:all .12s;}
.rtab.active,.rtab:hover{border-color:#E0115F;color:#E0115F;background:#fff0f5;}
.tbl-wrap{overflow-x:auto;min-height:180px;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:650px;}
thead tr{background:#222;}
th{padding:8px 10px;text-align:left;font-size:9px;font-weight:700;color:#C4973B;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;cursor:pointer;}
th:hover{color:#E0115F;}
td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:middle;background:white;}
tr:nth-child(even) td{background:#f9f9f9;}
tr:hover td{background:#fde8f0;}
.pname{font-weight:800;font-size:12px;}.psub{font-size:10px;color:#888;margin-top:1px;}
.badge{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;}
.b-firmar{background:#E0115F;color:white;}
.b-prio{background:#C4973B;color:white;}
.b-gen{background:#777;color:white;}
.inf-pill{background:#111;color:#C4973B;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;}
.liga-tag{background:#f0f0f0;color:#555;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;margin-right:2px;}
.act-btn{background:none;border:1px solid #ddd;border-radius:6px;padding:2px 7px;font-size:10px;color:#666;cursor:pointer;margin-right:3px;}
.act-btn:hover{border-color:#E0115F;color:#E0115F;}
.del-btn{background:none;border:none;color:#ddd;cursor:pointer;font-size:13px;}
.del-btn:hover{color:#E0115F;}
.empty-row td{text-align:center;padding:36px;color:#aaa;font-size:12px;}
/* DASH */
.dash-toolbar{background:#0f0f1a;padding:10px 18px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #333;}
.dash-search{padding:6px 12px;border:1px solid #333;border-radius:20px;font-size:12px;background:#1a1a2e;color:white;width:200px;}
.dash-search:focus{outline:none;border-color:#E0115F;}
.dash-flt{padding:6px 10px;border:1px solid #333;border-radius:20px;font-size:12px;background:#1a1a2e;color:#ccc;cursor:pointer;}
.liga-selector{padding:8px 18px;display:flex;gap:6px;flex-wrap:wrap;background:#0f0f1a;border-bottom:1px solid #222;}
.liga-btn{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #333;color:#888;background:#1a1a2e;transition:all .15s;white-space:nowrap;}
.liga-btn.active{border-color:#E0115F;color:#E0115F;background:#2a0a15;}
.liga-btn:hover{border-color:#C4973B;color:#C4973B;}
.pitch-outer{padding:16px 24px;display:flex;justify-content:center;background:#1a1a2e;}
.pitch{position:relative;width:100%;max-width:1000px;aspect-ratio:0.82;
  background:linear-gradient(180deg,#2d5a1b 0%,#3a7a24 8.33%,#2d5a1b 8.33%,#2d5a1b 16.66%,#3a7a24 16.66%,#3a7a24 25%,#2d5a1b 25%,#2d5a1b 33.33%,#3a7a24 33.33%,#3a7a24 41.66%,#2d5a1b 41.66%,#2d5a1b 50%,#3a7a24 50%,#3a7a24 58.33%,#2d5a1b 58.33%,#2d5a1b 66.66%,#3a7a24 66.66%,#3a7a24 75%,#2d5a1b 75%,#2d5a1b 83.33%,#3a7a24 83.33%,#3a7a24 91.66%,#2d5a1b 91.66%);
  border:2px solid rgba(255,255,255,0.4);border-radius:4px;}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.float-card{position:absolute;background:white;border-radius:6px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.5);width:14%;}
.fc-hdr{padding:4px 7px;font-size:8px;font-weight:800;letter-spacing:1px;color:white;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.fc-hdr:hover{filter:brightness(1.12);}
.fc-badge{background:rgba(0,0,0,0.25);font-size:8px;padding:1px 5px;border-radius:8px;font-weight:700;}
.fc-body{max-height:160px;overflow-y:auto;}
.fc-body::-webkit-scrollbar{width:3px;}
.fc-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
.fc-row{display:flex;align-items:center;gap:3px;padding:2px 6px;border-top:1px solid #f0f0f0;}
.fc-row.firmar{background:#fde8f0;}
.fc-row.prio{background:#fdf6e8;}
.fc-row.gen{background:#f8f8f8;}
.fc-row.hidden-p{display:none;}
.fc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.fc-flag{font-size:10px;flex-shrink:0;}
.fc-name{font-size:8.5px;font-weight:700;color:#111;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fc-year{font-size:8px;color:#999;white-space:nowrap;}
.fc-empty{padding:5px 7px;font-size:8px;color:#aaa;text-align:center;font-style:italic;}
.collapsed .fc-body{display:none;}
.dash-legend{display:flex;gap:16px;flex-wrap:wrap;padding:8px 18px;background:#0f0f1a;justify-content:center;border-top:1px solid #222;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:#888;}
.leg-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);}
/* MODAL */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:300;}
.modal{background:white;border-radius:12px;padding:22px;width:540px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-ttl{font-size:15px;font-weight:800;color:#111;}
.modal-x{background:none;border:none;font-size:20px;cursor:pointer;color:#888;}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.fl{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;}
.fi{padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;}
.fi:focus{outline:none;border-color:#E0115F;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.btn-cancel{background:#eee;color:#666;padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;}
.btn-save{background:#E0115F;color:white;padding:8px 18px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;}
.liga-checks{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.liga-check-item{display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;}
.liga-check-item input{accent-color:#E0115F;}
.add-liga-row{display:flex;gap:6px;margin-top:8px;}
.add-liga-inp{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:11px;}
.add-liga-btn{background:#111;color:white;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;}
.bot-bar{height:4px;background:linear-gradient(90deg,#E0115F 0%,#C4973B 50%,#E0115F 100%);}
</style>
</head>
<body>
<div style="padding:0.5rem 0;">
<div class="wrap">
<div class="top-bar"></div>
<div class="hdr">
  <div><div class="hdr-title">⚽ Base de Datos · Scouting</div><div class="hdr-sub">Inter Miami CF — Departamento de Scouting</div></div>
  <div class="hdr-stats">
    <div class="hs"><div class="hs-n" id="cnt-total" style="color:#E0115F">0</div><div class="hs-l">Jugadores</div></div>
    <div class="hs"><div class="hs-n" id="cnt-firmar" style="color:#E0115F">0</div><div class="hs-l">Firmar</div></div>
    <div class="hs"><div class="hs-n" id="cnt-prio" style="color:#C4973B">0</div><div class="hs-l">Prioritarios</div></div>
    <div class="hs"><div class="hs-n" id="cnt-gen" style="color:#777">0</div><div class="hs-l">Generales</div></div>
  </div>
</div>
<div class="main-tabs">
  <div class="mtab active" onclick="setMainTab('db')">📋 Base de datos</div>
  <div class="mtab" onclick="setMainTab('dash')">🏟 Dashboard canchas</div>
</div>

<!-- DB -->
<div id="section-db">
  <div class="toolbar">
    <input class="srch" id="search" placeholder="🔍  Buscar jugador..." oninput="renderTable()">
    <select class="flt" id="flt-liga" onchange="renderTable()"><option value="">Todas las ligas</option></select>
    <select class="flt" id="flt-nivel" onchange="renderTable()">
      <option value="">Todos los niveles</option>
      <option value="Firmar">⭐ Firmar</option>
      <option value="Prioritario">🔶 Prioritario</option>
      <option value="General">◽ General</option>
    </select>
    <button class="btn btn-pink" onclick="openModal()">+ Agregar</button>
    <button class="btn btn-dark" onclick="exportCSV()">↓ CSV</button>
  </div>
  <div class="pos-tabs" id="pos-tabs"></div>
  <div class="role-tabs" id="role-tabs"></div>
  <div class="tbl-wrap">
    <table><thead><tr>
      <th onclick="sortBy('name')">Jugador ↕</th>
      <th onclick="sortBy('year')">Año ↕</th>
      <th onclick="sortBy('role')">Rol</th>
      <th onclick="sortBy('nivel')">Nivel ↕</th>
      <th>Ligas</th>
      <th>Informes</th>
      <th>Acc.</th>
    </tr></thead><tbody id="tbl-body"></tbody></table>
  </div>
</div>

<!-- DASHBOARD -->
<div id="section-dash" style="display:none;">
  <div class="dash-toolbar">
    <input class="dash-search" id="dash-search" placeholder="🔍 Filtrar jugadores..." oninput="filterDash()">
    <select class="dash-flt" id="dash-nivel" onchange="filterDash()">
      <option value="">Todos los niveles</option>
      <option value="Firmar">⭐ Firmar</option>
      <option value="Prioritario">🔶 Prioritario</option>
      <option value="General">◽ General</option>
    </select>
    <span style="color:#555;font-size:10px;margin-left:4px;">Clic en encabezado para colapsar tarjeta</span>
  </div>
  <div class="liga-selector" id="liga-selector"></div>
  <div class="pitch-outer">
    <div class="pitch" id="pitch">
      <svg class="pitch-svg" viewBox="0 0 100 122" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="61" x2="100" y2="61" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
        <circle cx="50" cy="61" r="9" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
        <circle cx="50" cy="61" r="0.8" fill="rgba(255,255,255,0.35)"/>
        <rect x="22" y="0" width="56" height="18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
        <rect x="22" y="104" width="56" height="18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
        <rect x="35" y="0" width="30" height="7" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
        <rect x="35" y="115" width="30" height="7" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
        <path d="M 37 18 A 9 9 0 0 0 63 18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
        <path d="M 37 104 A 9 9 0 0 1 63 104" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>
        <rect x="40" y="-3" width="20" height="3" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.4"/>
        <rect x="40" y="122" width="20" height="3" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.4"/>
      </svg>
      <div id="cards-container"></div>
    </div>
  </div>
  <div class="dash-legend">
    <div class="leg"><div class="leg-dot" style="background:#E0115F"></div>Firmar</div>
    <div class="leg"><div class="leg-dot" style="background:#C4973B"></div>Prioritario</div>
    <div class="leg"><div class="leg-dot" style="background:#777"></div>General</div>
  </div>
</div>
<div class="bot-bar"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" style="display:none;">
<div class="modal">
  <div class="modal-hdr">
    <div class="modal-ttl" id="modal-ttl">Agregar jugador</div>
    <button class="modal-x" onclick="closeModal()">✕</button>
  </div>
  <div class="grid2">
    <div class="fg"><label class="fl">Nombre *</label><input class="fi" id="f-name" placeholder="Nombre completo"></div>
    <div class="fg"><label class="fl">Año *</label><input class="fi" id="f-year" type="number" placeholder="2003"></div>
    <div class="fg"><label class="fl">País / Bandera</label><input class="fi" id="f-country" placeholder="🇦🇷 Argentina"></div>
    <div class="fg"><label class="fl">Posición *</label>
      <select class="fi" id="f-pos" onchange="updateRoles()">
        <option value="">Seleccionar...</option>
        <option value="GK">Goalkeeper</option>
        <option value="DF">Defensor</option>
        <option value="MF">Mediocampista</option>
        <option value="FW">Delantero</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Rol *</label><select class="fi" id="f-role"><option value="">Primero elegí posición</option></select></div>
    <div class="fg"><label class="fl">Nivel *</label>
      <select class="fi" id="f-nivel">
        <option value="Firmar">⭐ Firmar</option>
        <option value="Prioritario">🔶 Prioritario</option>
        <option value="General">◽ General</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Informes</label><input class="fi" id="f-informes" type="number" min="0" value="1"></div>
    <div class="fg"><label class="fl">Link TM</label><input class="fi" id="f-tm" placeholder="https://transfermarkt.com/..."></div>
  </div>
  <div class="fg"><label class="fl">Notas</label><textarea class="fi" id="f-notes" rows="2" placeholder="Observaciones..."></textarea></div>
  <div class="fg">
    <label class="fl">Dashboards de liga 🏟</label>
    <div class="liga-checks" id="liga-checks"></div>
    <div class="add-liga-row">
      <input class="add-liga-inp" id="new-liga-inp" placeholder="Nueva liga (ej: Liga MX)">
      <button class="add-liga-btn" onclick="addNewLiga()">+ Crear</button>
    </div>
  </div>
  <div class="mfooter">
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="btn-save" onclick="savePlayer()">Guardar jugador</button>
  </div>
</div>
</div>
</div>

<script>
const ROLES={GK:["Goalkeeper"],DF:["Covering Centre Back","Aggressive Centre Back","Defensive LB / RB","Attacking LB / RB"],MF:["Number 6","Number 8","Number 10"],FW:["Outside Winger","Pocket Player / Winger","Striker"]};
const POS_LABELS={GK:"GK",DF:"Defensores",MF:"Mediocampistas",FW:"Delanteros"};
const POS_COLORS={GK:"#E87722",DF:"#1E5AA8",MF:"#2E7D32",FW:"#C62828"};
const NIVEL_COLOR={Firmar:"#E0115F",Prioritario:"#C4973B",General:"#777"};
const NIVEL_CLASS={Firmar:"firmar",Prioritario:"prio",General:"gen"};
const LEVEL_ORDER={Firmar:0,Prioritario:1,General:2};

const CARDS=[
  {key:"lw-out",  role:"Outside Winger",         side:"L", label:"LW OUTSIDE",       color:"#C62828", l:"1%",  t:"1%"},
  {key:"lw-pkt",  role:"Pocket Player / Winger", side:"L", label:"LW POCKET PLAYER", color:"#C62828", l:"1%",  t:"16%"},
  {key:"st",      role:"Striker",                            label:"STRIKER",           color:"#C62828", l:"36%", t:"8%"},
  {key:"rw-pkt",  role:"Pocket Player / Winger", side:"R", label:"RW POCKET PLAYER", color:"#C62828", l:"72%", t:"16%"},
  {key:"rw-out",  role:"Outside Winger",         side:"R", label:"RW OUTSIDE",        color:"#C62828", l:"72%", t:"1%"},
  {key:"n10",     role:"Number 10",                          label:"NUMBER 10",         color:"#2E7D32", l:"1%",  t:"34%"},
  {key:"n8",      role:"Number 8",                           label:"NUMBER 8",          color:"#2E7D32", l:"36%", t:"34%"},
  {key:"n6",      role:"Number 6",                           label:"NUMBER 6",          color:"#2E7D32", l:"72%", t:"34%"},
  {key:"lb-att",  role:"Attacking LB / RB",      side:"L", label:"LB ATTACKING",      color:"#1E5AA8", l:"1%",  t:"53%"},
  {key:"lcb-cov", role:"Covering Centre Back",   side:"L", label:"LCB COVERING",      color:"#1E5AA8", l:"25%", t:"53%"},
  {key:"rcb-cov", role:"Covering Centre Back",   side:"R", label:"RCB COVERING",      color:"#1E5AA8", l:"50%", t:"53%"},
  {key:"rb-att",  role:"Attacking LB / RB",      side:"R", label:"RB ATTACKING",      color:"#1E5AA8", l:"72%", t:"53%"},
  {key:"lb-def",  role:"Defensive LB / RB",      side:"L", label:"LB DEFENSIVE",      color:"#1E5AA8", l:"1%",  t:"69%"},
  {key:"lcb-agg", role:"Aggressive Centre Back",  side:"L", label:"LCB AGGRESSIVE",   color:"#1E5AA8", l:"25%", t:"69%"},
  {key:"rcb-agg", role:"Aggressive Centre Back",  side:"R", label:"RCB AGGRESSIVE",   color:"#1E5AA8", l:"50%", t:"69%"},
  {key:"rb-def",  role:"Defensive LB / RB",      side:"R", label:"RB DEFENSIVE",      color:"#1E5AA8", l:"72%", t:"69%"},
  {key:"gk",      role:"Goalkeeper",                         label:"GOALKEEPER",        color:"#E87722", l:"36%", t:"84%"},
];

let players=[], ligas=["General"], activeLiga="General", activePos="ALL", activeRole="ALL", editingId=null, sortKey="nivel", sortAsc=true;

const SEED=[
{name:"Keegan Jelacic",year:2002,country:"🇦🇺 Australia",pos:"FW",role:"Outside Winger",nivel:"Prioritario",ligas:["General","Liga Australia"],informes:1},
{name:"Bozhidar Kraev",year:1997,country:"🇧🇬 Bulgaria",pos:"FW",role:"Outside Winger",nivel:"Prioritario",ligas:["General","Liga Australia"],informes:1},
{name:"J. Brazete",year:2006,country:"🇦🇺 Australia",pos:"FW",role:"Outside Winger",nivel:"Prioritario",ligas:["General","Liga Australia"],informes:2},
{name:"Trent Ostler",year:2002,country:"🇦🇺 Australia",pos:"FW",role:"Outside Winger",nivel:"Prioritario",ligas:["General","Liga Australia"],informes:1},
{name:"Marco Tilio",year:2001,country:"🇦🇺 Australia",pos:"FW",role:"Pocket Player / Winger",nivel:"Prioritario",ligas:["General","Liga Australia"],informes:1},
{name:"Jaylan Pearman",year:2006,country:"🇦🇺 Australia",pos:"FW",role:"Striker",nivel:"Prioritario",ligas:["General","Liga Australia"],informes:2},
{name:"Max Caputo",year:2005,country:"🇦🇺 Australia",pos:"FW",role:"Striker",nivel:"Prioritario",ligas:["General","Liga Australia"],informes:2},

function setMainTab(t){
  document.getElementById("section-db").style.display=t==="db"?"":"none";
  document.getElementById("section-dash").style.display=t==="dash"?"":"none";
  document.querySelectorAll(".mtab").forEach((el,i)=>el.classList.toggle("active",[" db","dash"][i]===` ${t}`));
  if(t==="dash")renderDash();
}

function renderPosTabs(){
  const counts={ALL:players.length};
  players.forEach(p=>{counts[p.pos]=(counts[p.pos]||0)+1;});
  const ptabs=document.getElementById("pos-tabs");
  const positions=["ALL","GK","DF","MF","FW"];
  ptabs.innerHTML=positions.map(pos=>{
    const label=pos==="ALL"?"Todos":POS_LABELS[pos]||pos;
    const col=pos==="ALL"?"#E0115F":POS_COLORS[pos]||"#888";
    const isActive=activePos===pos;
    return`<div class="ptab ${isActive?"active":""}" onclick="setPos('${pos}')" style="${isActive?`color:${col};border-bottom-color:${col}`:""}">
      <div class="ptab-dot" style="background:${col}"></div>${label}
      <span class="cpill">${counts[pos]||0}</span></div>`;
  }).join("");
  renderRoleTabs();
}

function renderRoleTabs(){
  const rtabs=document.getElementById("role-tabs");
  if(activePos==="ALL"){rtabs.innerHTML="";return;}
  const roles=ROLES[activePos]||[];
  rtabs.innerHTML=[{role:"ALL",label:"Todos"},...roles.map(r=>({role:r,label:r}))].map(({role,label})=>{
    const isA=activeRole===role;
    return`<div class="rtab ${isA?"active":""}" onclick="setRole('${role.replace(/'/g,"\\'")}')"> ${label}</div>`;
  }).join("");
}

function setPos(p){activePos=p;activeRole="ALL";renderTable();}
function setRole(r){activeRole=r;renderTable();}

function getFiltered(){
  const q=(document.getElementById("search")||{}).value?.toLowerCase()||"";
  const lg=(document.getElementById("flt-liga")||{}).value||"";
  const nv=(document.getElementById("flt-nivel")||{}).value||"";
  return players.filter(p=>{
    if(activePos!=="ALL"&&p.pos!==activePos)return false;
    if(activeRole!=="ALL"&&p.role!==activeRole)return false;
    if(lg&&!(p.ligas||[]).includes(lg))return false;
    if(nv&&p.nivel!==nv)return false;
    if(q&&!`${p.name} ${p.country||""}`.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{
    let va=a[sortKey]||"",vb=b[sortKey]||"";
    if(sortKey==="nivel"){va=LEVEL_ORDER[va]??9;vb=LEVEL_ORDER[vb]??9;}
    if(va<vb)return sortAsc?-1:1;if(va>vb)return sortAsc?1:-1;return 0;
  });
}
function sortBy(k){if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=true;}renderTable();}

function renderTable(){
  const data=getFiltered();
  const tbody=document.getElementById("tbl-body");
  if(!tbody)return;
  if(!data.length){tbody.innerHTML=`<tr class="empty-row"><td colspan="7">No hay jugadores. <span style="color:#E0115F;cursor:pointer;font-weight:700" onclick="openModal()">+ Agregar</span></td></tr>`;return;}
  tbody.innerHTML=data.map(p=>{
    const bc=p.nivel==="Firmar"?"b-firmar":p.nivel==="Prioritario"?"b-prio":"b-gen";
    const tags=(p.ligas||[]).filter(l=>l!=="General").map(l=>`<span class="liga-tag">${l}</span>`).join("");
    const tmLink=p.tm?`<a href="${p.tm}" target="_blank" class="act-btn" title="Transfermarkt">TM</a>`:"";
    return`<tr>
      <td><div class="pname">${p.name}</div><div class="psub">${p.country||""}${p.notes?` · <em style="color:#aaa">${p.notes}</em>`:""}</div></td>
      <td>${p.year||""}</td>
      <td><span style="font-size:9px;color:#C4973B;font-weight:600">${p.role||""}</span></td>
      <td><span class="badge ${bc}">${p.nivel||""}</span></td>
      <td>${tags||"—"}</td>
      <td style="text-align:center"><span class="inf-pill">${p.informes||0}</span></td>
      <td style="white-space:nowrap">
        ${tmLink}<button class="act-btn" onclick="editPlayer(${JSON.stringify(p.id)})">✏</button>
        <button class="del-btn" onclick="deletePlayer(${JSON.stringify(p.id)})">✕</button>
      </td>
    </tr>`;
  }).join("");
  renderPosTabs();
}

function renderAll(){updateStats();updateLigaFilter();renderTable();}

function updateStats(){
  document.getElementById("cnt-total").textContent=players.length;
  document.getElementById("cnt-firmar").textContent=players.filter(p=>p.nivel==="Firmar").length;
  document.getElementById("cnt-prio").textContent=players.filter(p=>p.nivel==="Prioritario").length;
  document.getElementById("cnt-gen").textContent=players.filter(p=>p.nivel==="General").length;
}
function updateLigaFilter(){
  const sel=document.getElementById("flt-liga");if(!sel)return;
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas las ligas</option>'+ligas.map(l=>`<option value="${l}"${l===cur?" selected":""}>${l}</option>`).join("");
}

// SAVE / LOAD (localStorage)
function saveAll(){
  try{localStorage.setItem("im_players",JSON.stringify(players));localStorage.setItem("im_ligas",JSON.stringify(ligas));}catch(e){}
}
function load(){
  try{
    const sp=localStorage.getItem("im_players");
    const sl=localStorage.getItem("im_ligas");
    if(sp){players=JSON.parse(sp);}else{players=SEED.map((p,i)=>({...p,id:i+1}));}
    if(sl){ligas=JSON.parse(sl);}else{
      const ls=new Set(["General"]);
      players.forEach(p=>(p.ligas||[]).forEach(l=>ls.add(l)));
      ligas=[...ls];
    }
  }catch(e){players=SEED.map((p,i)=>({...p,id:i+1}));ligas=["General"];}
  renderAll();
}

// DASHBOARD
function renderDash(){
  document.getElementById("liga-selector").innerHTML=ligas.map(l=>
    `<div class="liga-btn ${activeLiga===l?"active":""}" onclick="setLiga('${l.replace(/'/g,"\\'").replace(/"/g,'\\"')}')">⚽ ${l}</div>`
  ).join("");
  renderCards();
}
function setLiga(l){activeLiga=l;renderDash();}

function getCardPlayers(cd,all){
  const same=all.filter(p=>p.role===cd.role);
  const half=Math.ceil(same.length/2);
  if(cd.side==="L")return same.slice(0,half);
  if(cd.side==="R")return same.slice(half);
  return same;
}

function renderCards(){
  const cont=document.getElementById("cards-container");
  cont.innerHTML="";
  const all=players.filter(p=>(p.ligas||[]).includes(activeLiga));
  const q=(document.getElementById("dash-search")||{}).value?.toLowerCase()||"";
  const nv=(document.getElementById("dash-nivel")||{}).value||"";

  CARDS.forEach(cd=>{
    const rp=getCardPlayers(cd,all);
    const card=document.createElement("div");
    card.className="float-card";
    card.style.cssText=`left:${cd.l};top:${cd.t};`;
    card.id=`card-${cd.key}`;

    const hdr=document.createElement("div");
    hdr.className="fc-hdr";
    hdr.style.background=cd.color;
    hdr.innerHTML=`— ${cd.label} <span class="fc-badge">${rp.length}</span>`;
    hdr.onclick=()=>card.classList.toggle("collapsed");
    card.appendChild(hdr);

    const body=document.createElement("div");
    body.className="fc-body";
    if(!rp.length){
      body.innerHTML=`<div class="fc-empty">—</div>`;
    } else {
      const sorted=[...rp].sort((a,b)=>(LEVEL_ORDER[a.nivel]??9)-(LEVEL_ORDER[b.nivel]??9));
      sorted.forEach(p=>{
        const hidden=(q&&!`${p.name} ${p.country||""}`.toLowerCase().includes(q))||(nv&&p.nivel!==nv);
        const row=document.createElement("div");
        row.className=`fc-row ${NIVEL_CLASS[p.nivel]||"gen"}${hidden?" hidden-p":""}`;
        row.dataset.name=`${p.name} ${p.country||""}`.toLowerCase();
        row.dataset.nivel=p.nivel||"";
        const flag=(p.country||"").split(" ")[0]||"";
        row.innerHTML=`<div class="fc-dot" style="background:${NIVEL_COLOR[p.nivel]||"#777"}"></div>
          <span class="fc-flag">${flag}</span>
          <span class="fc-name">${p.name}</span>
          <span class="fc-year">${p.year||""}</span>`;
        body.appendChild(row);
      });
    }
    card.appendChild(body);
    cont.appendChild(card);
  });
}

function filterDash(){
  const q=(document.getElementById("dash-search")||{}).value?.toLowerCase()||"";
  const nv=(document.getElementById("dash-nivel")||{}).value||"";
  document.querySelectorAll(".fc-row").forEach(row=>{
    const ok=(!q||row.dataset.name?.includes(q))&&(!nv||row.dataset.nivel===nv);
    row.classList.toggle("hidden-p",!ok);
  });
  CARDS.forEach(cd=>{
    const card=document.getElementById(`card-${cd.key}`);
    if(!card)return;
    const v=card.querySelectorAll(".fc-row:not(.hidden-p)").length;
    const b=card.querySelector(".fc-badge");
    if(b)b.textContent=v;
  });
}

// MODAL
function updateRoles(){
  const pos=document.getElementById("f-pos").value;
  const sel=document.getElementById("f-role");
  if(!pos){sel.innerHTML='<option value="">Primero elegí posición</option>';return;}
  sel.innerHTML=(ROLES[pos]||[]).map(r=>`<option value="${r}">${r}</option>`).join("");
}
function renderLigaChecks(sel=[]){
  document.getElementById("liga-checks").innerHTML=ligas.map(l=>
    `<label class="liga-check-item"><input type="checkbox" value="${l}" ${sel.includes(l)?"checked":""}> ${l}</label>`
  ).join("");
}
function addNewLiga(){
  const inp=document.getElementById("new-liga-inp");
  const val=inp.value.trim();if(!val)return;
  if(!ligas.includes(val))ligas.push(val);
  inp.value="";
  const cur=[...document.querySelectorAll("#liga-checks input:checked")].map(x=>x.value);
  renderLigaChecks([...new Set([...cur,val])]);
  saveAll();updateLigaFilter();
}
function openModal(id=null){
  editingId=id;
  const p=id?players.find(x=>x.id===id):null;
  document.getElementById("modal-ttl").textContent=p?"Editar jugador":"Agregar jugador";
  document.getElementById("f-name").value=p?.name||"";
  document.getElementById("f-year").value=p?.year||"";
  document.getElementById("f-country").value=p?.country||"";
  document.getElementById("f-pos").value=p?.pos||"";
  updateRoles();
  if(p?.role)document.getElementById("f-role").value=p.role;
  document.getElementById("f-nivel").value=p?.nivel||"Prioritario";
  document.getElementById("f-informes").value=p?.informes||1;
  document.getElementById("f-tm").value=p?.tm||"";
  document.getElementById("f-notes").value=p?.notes||"";
  renderLigaChecks(p?.ligas||["General"]);
  document.getElementById("modal").style.display="flex";
}
function closeModal(){document.getElementById("modal").style.display="none";editingId=null;}
function savePlayer(){
  const name=document.getElementById("f-name").value.trim();
  const pos=document.getElementById("f-pos").value;
  const role=document.getElementById("f-role").value;
  const nivel=document.getElementById("f-nivel").value;
  if(!name||!pos||!role||!nivel){alert("Completá los campos obligatorios (*)");return;}
  const selLigas=[...document.querySelectorAll("#liga-checks input:checked")].map(x=>x.value);
  const data={name,pos,role,nivel,
    year:+document.getElementById("f-year").value||"",
    country:document.getElementById("f-country").value.trim(),
    informes:+document.getElementById("f-informes").value||1,
    tm:document.getElementById("f-tm").value.trim(),
    notes:document.getElementById("f-notes").value.trim(),
    ligas:selLigas.length?selLigas:["General"]
  };
  if(editingId){const idx=players.findIndex(p=>p.id===editingId);if(idx>=0)players[idx]={...players[idx],...data};}
  else{data.id=Date.now()+Math.random();players.push(data);}
  saveAll();closeModal();renderAll();
  if(document.getElementById("section-dash").style.display!=="none")renderDash();
}
function deletePlayer(id){
  if(!confirm("¿Eliminar este jugador?"))return;
  players=players.filter(p=>p.id!==id);
  saveAll();renderAll();
}
function editPlayer(id){openModal(id);}
function exportCSV(){
  const h=["Nombre","Año","País","Pos","Rol","Nivel","Ligas","Informes","TM","Notas"];
  const rows=players.map(p=>[p.name,p.year,p.country,p.pos,p.role,p.nivel,(p.ligas||[]).join("|"),p.informes,p.tm,p.notes].map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`));
  const csv=[h.join(","),...rows.map(r=>r.join(","))].join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="InterMiami_DB.csv";a.click();
}

load();
